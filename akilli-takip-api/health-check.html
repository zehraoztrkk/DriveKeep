<!DOCTYPE html>
<html>
<head>
    <title>System Health Check</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .test { margin: 10px 0; padding: 10px; background: white; border-left: 4px solid #007bff; }
        .pass { border-left-color: #28a745; }
        .fail { border-left-color: #dc3545; }
        .loading { border-left-color: #ffc107; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🔍 DriveKeep Sistem Kontrol Paneli</h1>
    
    <div id="tests"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const tests = document.getElementById('tests');

        async function runTest(name, fn) {
            const div = document.createElement('div');
            div.className = 'test loading';
            div.innerHTML = `<strong>${name}</strong><br><span id="status">Kontrol ediliyor...</span><pre id="result"></pre>`;
            tests.appendChild(div);

            try {
                const result = await fn();
                div.className = 'test pass';
                document.getElementById('status').innerHTML = `✅ ${name}`;
                document.getElementById('result').textContent = JSON.stringify(result, null, 2).substring(0, 300);
            } catch (err) {
                div.className = 'test fail';
                document.getElementById('status').innerHTML = `❌ ${name}: ${err.message}`;
                document.getElementById('result').textContent = err.toString();
            }
        }

        // Tests
        runTest('1. API Sunucu Bağlantısı', async () => {
            const res = await fetch(API_URL + '/araclar/konum');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        });

        runTest('2. Aktif Kiralama Listesi', async () => {
            const res = await fetch(API_URL + '/kiralamalar/aktif');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        });

        runTest('3. Kiralama Geçmiş', async () => {
            const res = await fetch(API_URL + '/kiralamalar/gecmis');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        });

        runTest('4. Düşük Batarya Araçları', async () => {
            const res = await fetch(API_URL + '/bakim/dusuk-batarya');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        });

        runTest('5. En Yakın Araçlar (Örnek)', async () => {
            const res = await fetch(API_URL + '/araclar/yakin?lat=40.65&lon=35.84');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        });

        runTest('6. Bootstrap Yüklü mü?', async () => {
            return { jQuery: typeof jQuery !== 'undefined', Bootstrap: typeof $.fn.modal !== 'undefined' };
        });

        runTest('7. Leaflet Harita Yüklü mü?', async () => {
            return { Leaflet: typeof L !== 'undefined', Layer: typeof L.layerGroup !== 'undefined' };
        });
    </script>
</body>
</html>
